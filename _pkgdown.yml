url: https://clinical-pharmacy-saarland-university.github.io/lstparsR/

logo: man/figures/logo.png

template:
  package: themakR
  params:
    part_of: >
      the <a href="http://www.clinicalpharmacy.me">Clinical Pharmacy</a> group
      and the <a href="https://cttir.github.io/website/">CTTIR</a> suite

development:
  mode: auto
navbar:
  bg: primary
  structure:
    left:  [home, getstarted, articles, reference, news]
    right: [github, lightswitch]
  components:
    home:
      text: "Home"
      href: index.html
    getstarted:
      text: "Get Started"
      href: articles/getting-started.html
    articles:
      text: "Vignettes"
      href: articles/index.html
    reference:
      text: "Functions"
      href: reference/index.html
    news:
      text: "News"
      href: news/index.html
    github:
      icon: fa-github
      href: https://github.com/Clinical-Pharmacy-Saarland-University/lstparsR
      aria-label: GitHub

home:
  title: "lstparsR — Tidy Parsing of NONMEM Listing Files"
  description: >
    Parse NONMEM .lst output files into tidy tibbles for population
    PK/PD analysis. Extracts THETA, OMEGA, SIGMA, OFV, condition number,
    and ETA shrinkage with graceful NA handling for failed runs.

articles:
  - title: "Vignettes"
    desc: >
      Step-by-step guides for using lstparsR in population PK/PD workflows.
    contents:
      - getting-started
      - lstparsR-guide

reference:
  - title: "Read Listing Files"
    desc: "Import NONMEM `.lst` files into R."
    contents:
      - read_lst_file

  - title: "Extract Parameters"
    desc: "Parse individual parameter blocks from a listing file."
    contents:
      - fetch_thetas
      - fetch_etas
      - fetch_sigmas
      - fetch_ofv
      - fetch_condn

  - title: "Convenience Wrappers"
    desc: "Run all parsers in one call."
    contents:
      - fetch_all

  - title: "Interactive Application"
    desc: "Browser-based Shiny interface for point-and-click exploration."
    contents:
      - run_app

  - title: "Package"
    desc: "Package-level documentation."
    contents:
      - lstparsR-package
